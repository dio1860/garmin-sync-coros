name: Automatic Sync Upstream

on:
  schedule:
    - cron: '0 0 */3 * *' # 每 3 天自动检测并同步一次
  workflow_dispatch: # 支持在 Actions 页面手动点击触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync GitHub Fork
        run: gh repo sync dio1860/garmin-sync-coros --source XiaoSiHwang/garmin-sync-coros
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
